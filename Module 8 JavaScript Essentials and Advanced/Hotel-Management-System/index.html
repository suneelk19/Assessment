<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h2 class="text-center">

Hotel Management System

</h2>

</div>

<div class="card-body">

<div id="message"></div>

<form id="hotelForm">

<div class="row">

<div class="col-md-6">

<label class="form-label">Full Name</label>

<input type="text" id="name" class="form-control">

<small class="text-danger" id="nameError"></small>

</div>

<div class="col-md-6">

<label class="form-label">Phone Number</label>

<input type="text" id="phone" class="form-control">

<small class="text-danger" id="phoneError"></small>

</div>

</div>

<div class="row mt-3">

<div class="col-md-6">

<label>Email</label>

<input type="email" id="email" class="form-control">

<small class="text-danger" id="emailError"></small>

</div>

<div class="col-md-6">

<label>Aadhar Number</label>

<input type="text" id="aadhar" class="form-control">

<small class="text-danger" id="aadharError"></small>

</div>

</div>

<div class="mt-3">

<label>Address</label>

<textarea id="address" class="form-control"></textarea>

<small class="text-danger" id="addressError"></small>

</div>

<div class="row mt-3">

<div class="col-md-6">

<label>Check In</label>

<input type="date" id="checkin" class="form-control">

<small class="text-danger" id="checkinError"></small>

</div>

<div class="col-md-6">

<label>Check Out</label>

<input type="date" id="checkout" class="form-control">

<small class="text-danger" id="checkoutError"></small>

</div>

</div>

<div class="row mt-3">

<div class="col-md-6">

<label>No of Adult</label>

<input type="number" id="adult" class="form-control">

<small class="text-danger" id="adultError"></small>

</div>

<div class="col-md-6">

<label>Purpose of Visit</label>

<textarea id="purpose" class="form-control"></textarea>

<small class="text-danger" id="purposeError"></small>

</div>

</div>

<div class="mt-4">

<button type="submit" class="btn btn-success w-100">

Submit

</button>

</div>

</form>

<hr>

<a href="view.html" class="btn btn-primary w-100">

View Submissions

</a>

</div>

</div>

</div>

<script type="module" src="js/app.js"></script>

</body>

</html>
