<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Submissions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="text-center mb-3">Hotel Submissions</h2>

<!--  SEARCH BOX (table ke bahar) -->
<input type="text" id="searchBox" placeholder="Search by name or date" class="form-control mb-3">

<!--  TABLE -->
<table class="table table-bordered">
    <thead>
        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Address</th>
            <th>Aadhar</th>
            <th>Check In</th>
            <th>Check Out</th>
            <th>Adult</th>
            <th>Purpose</th>
            <th>Action</th>
        </tr>
    </thead>

    <!--  DATA WILL COME HERE -->
    <tbody id="tableData"></tbody>
</table>

<!--  SCRIPT ALWAYS OUTSIDE TABLE -->
<script type="module" src="js/view.js"></script>

</body>
</html>
